<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stonewood Products — Operations Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue-primary: #1F4E66;
      --blue-secondary: #2E75B6;
      --blue-light: #3A8FD1;
      --bg: #0f1923;
      --surface: #162231;
      --surface2: #1d2f42;
      --surface3: #243650;
      --border: #2a4055;
      --text: #e2e8f0;
      --text-muted: #8fa4b8;
      --text-dim: #5A5A5A;
      --red: #e05252;
      --yellow: #e0b050;
      --green: #4caf7d;
      --red-bg: rgba(224,82,82,0.12);
      --yellow-bg: rgba(224,176,80,0.12);
      --green-bg: rgba(76,175,125,0.12);
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, var(--blue-primary) 0%, #162d3e 100%);
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 16px rgba(0,0,0,0.4);
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon {
      width: 40px; height: 40px;
      background: var(--blue-secondary);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 800; color: #fff; letter-spacing: -1px;
    }
    .logo-text { font-size: 1.2rem; font-weight: 700; color: #fff; }
    .logo-sub { font-size: 0.75rem; color: rgba(255,255,255,0.55); letter-spacing: 0.08em; text-transform: uppercase; }
    #sync-status {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.55);
      display: flex; align-items: center; gap: 6px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot.error { background: var(--red); box-shadow: 0 0 6px var(--red); }
    .dot.loading { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── Stats Bar ── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      padding: 24px 32px 0;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px 24px;
      display: flex; flex-direction: column; gap: 6px;
      transition: border-color 0.2s;
    }
    .stat-card:hover { border-color: var(--blue-secondary); }
    .stat-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); }
    .stat-value { font-size: 2rem; font-weight: 700; color: #fff; line-height: 1; }
    .stat-card.total .stat-value { color: var(--blue-light); }
    .stat-card.in-progress .stat-value { color: var(--yellow); }
    .stat-card.not-started .stat-value { color: var(--text-muted); }
    .stat-card.complete .stat-value { color: var(--green); }

    /* ── Main layout ── */
    main { padding: 24px 32px 48px; display: flex; flex-direction: column; gap: 20px; }

    /* ── Add Task Form ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .panel-header {
      padding: 14px 20px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .panel-title { font-size: 0.88rem; font-weight: 600; color: var(--text); text-transform: uppercase; letter-spacing: 0.06em; }
    .panel-toggle {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 1rem; padding: 2px 6px; border-radius: 4px;
      transition: color 0.2s, background 0.2s;
    }
    .panel-toggle:hover { color: var(--text); background: var(--surface3); }

    .form-body { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
    .form-row { display: grid; grid-template-columns: 2fr 1.2fr 1.2fr 1fr 1fr; gap: 12px; }
    .form-row-2 { display: grid; grid-template-columns: 1fr auto; gap: 12px; }

    label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; display: block; margin-bottom: 5px; }
    input[type="text"], input[type="date"], select, textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type="text"]:focus, input[type="date"]:focus, select:focus, textarea:focus {
      border-color: var(--blue-secondary);
      box-shadow: 0 0 0 3px rgba(46,117,182,0.2);
    }
    select { cursor: pointer; }
    textarea { resize: vertical; min-height: 64px; }

    .btn {
      padding: 9px 20px;
      border: none; border-radius: 7px;
      font-family: inherit; font-size: 0.88rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .btn-primary { background: var(--blue-secondary); color: #fff; }
    .btn-primary:hover { background: var(--blue-light); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(46,117,182,0.4); }
    .btn-primary:active { transform: translateY(0); }
    .btn-ghost { background: var(--surface3); color: var(--text-muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--blue-secondary); }

    /* ── Filters ── */
    .filters { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding: 16px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; }
    .filter-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-right: 4px; }
    .filter-btn {
      padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
      background: transparent; color: var(--text-muted); font-size: 0.82rem; font-family: inherit;
      cursor: pointer; transition: all 0.2s;
    }
    .filter-btn:hover { color: var(--text); border-color: var(--blue-secondary); }
    .filter-btn.active { background: var(--blue-primary); color: #fff; border-color: var(--blue-secondary); }
    .search-box { margin-left: auto; }
    .search-box input { width: 200px; padding: 6px 12px; font-size: 0.85rem; }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: var(--surface2);
      padding: 12px 16px;
      font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-muted); text-align: left; white-space: nowrap;
      border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
      transition: color 0.2s;
    }
    thead th:hover { color: var(--text); }
    thead th .sort-arrow { margin-left: 4px; opacity: 0.4; }
    thead th.sorted .sort-arrow { opacity: 1; color: var(--blue-light); }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: 13px 16px; font-size: 0.88rem; vertical-align: middle; }

    /* status badge */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 12px; font-size: 0.76rem; font-weight: 600;
    }
    .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }
    .badge-not-started { background: rgba(143,164,184,0.15); color: var(--text-muted); }
    .badge-not-started::before { background: var(--text-muted); }
    .badge-in-progress { background: var(--yellow-bg); color: var(--yellow); }
    .badge-in-progress::before { background: var(--yellow); }
    .badge-complete { background: var(--green-bg); color: var(--green); }
    .badge-complete::before { background: var(--green); }

    /* deadline urgency */
    .deadline {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 3px 10px; border-radius: 6px; font-size: 0.82rem; font-weight: 500;
    }
    .deadline-ok { background: var(--green-bg); color: var(--green); }
    .deadline-warn { background: var(--yellow-bg); color: var(--yellow); }
    .deadline-over { background: var(--red-bg); color: var(--red); }
    .deadline-none { color: var(--text-muted); font-style: italic; }

    .dept { color: var(--text-muted); font-size: 0.82rem; }
    .notes-cell { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-muted); font-size: 0.82rem; }

    .btn-delete {
      padding: 4px 10px; border: 1px solid transparent; border-radius: 6px;
      background: transparent; color: var(--text-muted);
      cursor: pointer; font-size: 0.82rem; transition: all 0.2s;
    }
    .btn-delete:hover { background: var(--red-bg); border-color: var(--red); color: var(--red); }

    .empty-state {
      padding: 60px 20px; text-align: center; color: var(--text-muted);
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.4; }
    .empty-state p { font-size: 0.9rem; }

    /* loading overlay */
    #loading-overlay {
      position: fixed; inset: 0; background: rgba(15,25,35,0.85);
      display: flex; align-items: center; justify-content: center; z-index: 100;
      font-size: 1rem; color: var(--text-muted);
      flex-direction: column; gap: 12px;
    }
    .spinner {
      width: 36px; height: 36px; border: 3px solid var(--border);
      border-top-color: var(--blue-secondary); border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-overlay.hidden { display: none; }

    /* toast */
    #toast {
      position: fixed; bottom: 28px; right: 28px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 12px 20px; border-radius: 8px;
      font-size: 0.88rem; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      transition: opacity 0.3s, transform 0.3s;
      opacity: 0; transform: translateY(10px); pointer-events: none; z-index: 200;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { border-left: 3px solid var(--green); }
    #toast.error { border-left: 3px solid var(--red); }

    /* ── Edit Modal ── */
    #modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center;
      z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    #modal-backdrop.open { opacity: 1; pointer-events: all; }
    #modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; width: 560px; max-width: 95vw;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      transform: translateY(16px); transition: transform 0.2s;
    }
    #modal-backdrop.open #modal { transform: translateY(0); }
    .modal-header {
      padding: 16px 20px; background: var(--surface2);
      border-bottom: 1px solid var(--border);
      border-radius: 14px 14px 0 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-title { font-size: 0.88rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
    .modal-close {
      background: none; border: none; color: var(--text-muted);
      font-size: 1.2rem; cursor: pointer; padding: 2px 6px; border-radius: 4px;
      transition: color 0.2s, background 0.2s; line-height: 1;
    }
    .modal-close:hover { color: var(--text); background: var(--surface3); }
    .modal-body { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
    .modal-footer {
      padding: 14px 20px; border-top: 1px solid var(--border);
      display: flex; justify-content: flex-end; gap: 10px;
    }
    .btn-edit {
      padding: 4px 10px; border: 1px solid transparent; border-radius: 6px;
      background: transparent; color: var(--text-muted);
      cursor: pointer; font-size: 0.82rem; transition: all 0.2s;
    }
    .btn-edit:hover { background: rgba(46,117,182,0.15); border-color: var(--blue-secondary); color: var(--blue-light); }

    /* ── Priority badges ── */
    .priority {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 10px; font-size: 0.74rem; font-weight: 700; letter-spacing: 0.03em;
    }
    .priority-high   { background: rgba(224,82,82,0.18);  color: var(--red); }
    .priority-medium { background: rgba(224,176,80,0.18); color: var(--yellow); }
    .priority-low    { background: rgba(76,175,125,0.18); color: var(--green); }

    @media (max-width: 900px) {
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
      .form-row { grid-template-columns: 1fr 1fr; }
      main, header { padding-left: 16px; padding-right: 16px; }
      .stats-bar { padding-left: 16px; padding-right: 16px; }
    }
    @media (max-width: 600px) {
      .stats-bar { grid-template-columns: 1fr 1fr; }
      .form-row { grid-template-columns: 1fr; }
      .form-row-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- Loading overlay -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <span>Loading tasks…</span>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Edit Modal -->
<div id="modal-backdrop">
  <div id="modal">
    <div class="modal-header">
      <span class="modal-title">✏️ Edit Task</span>
      <button class="modal-close" id="modal-close-btn">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div style="grid-column:1/-1">
          <label for="e-name">Task Name *</label>
          <input type="text" id="e-name" />
        </div>
      </div>
      <div class="form-row">
        <div>
          <label for="e-dept">Department</label>
          <input type="text" id="e-dept" />
        </div>
        <div>
          <label for="e-priority">Priority</label>
          <select id="e-priority">
            <option value="High">High</option>
            <option value="Medium">Medium</option>
            <option value="Low">Low</option>
          </select>
        </div>
        <div>
          <label for="e-status">Status</label>
          <select id="e-status">
            <option value="Not Started">Not Started</option>
            <option value="In Progress">In Progress</option>
            <option value="Complete">Complete</option>
          </select>
        </div>
        <div>
          <label for="e-deadline">Deadline</label>
          <input type="date" id="e-deadline" />
        </div>
      </div>
      <div>
        <label for="e-notes">Notes</label>
        <textarea id="e-notes"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="modal-cancel-btn">Cancel</button>
      <button class="btn btn-primary" id="modal-save-btn">Save Changes</button>
    </div>
  </div>
</div>

<!-- Header -->
<header>
  <div class="logo">
    <div class="logo-icon">SW</div>
    <div>
      <div class="logo-text">Stonewood Products</div>
      <div class="logo-sub">Operations Dashboard</div>
    </div>
  </div>
  <div id="sync-status"><div class="dot loading" id="sync-dot"></div><span id="sync-text">Connecting…</span></div>
</header>

<!-- Stats bar -->
<div class="stats-bar">
  <div class="stat-card total">
    <div class="stat-label">Total Tasks</div>
    <div class="stat-value" id="stat-total">0</div>
  </div>
  <div class="stat-card in-progress">
    <div class="stat-label">In Progress</div>
    <div class="stat-value" id="stat-inprogress">0</div>
  </div>
  <div class="stat-card not-started">
    <div class="stat-label">Not Started</div>
    <div class="stat-value" id="stat-notstarted">0</div>
  </div>
  <div class="stat-card complete">
    <div class="stat-label">Complete</div>
    <div class="stat-value" id="stat-complete">0</div>
  </div>
</div>

<main>
  <!-- Add Task Form -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">➕ Add New Task</span>
      <button class="panel-toggle" id="form-toggle" title="Collapse">▲</button>
    </div>
    <div id="form-body" class="form-body">
      <div class="form-row">
        <div>
          <label for="f-name">Task Name *</label>
          <input type="text" id="f-name" placeholder="Describe the task…" />
        </div>
        <div>
          <label for="f-dept">Department</label>
          <input type="text" id="f-dept" placeholder="e.g. Operations" />
        </div>
        <div>
          <label for="f-status">Status</label>
          <select id="f-status">
            <option value="Not Started">Not Started</option>
            <option value="In Progress">In Progress</option>
            <option value="Complete">Complete</option>
          </select>
        </div>
        <div>
          <label for="f-priority">Priority</label>
          <select id="f-priority">
            <option value="Medium">Medium</option>
            <option value="High">High</option>
            <option value="Low">Low</option>
          </select>
        </div>
        <div>
          <label for="f-deadline">Deadline</label>
          <input type="date" id="f-deadline" />
        </div>
      </div>
      <div class="form-row-2">
        <div>
          <label for="f-notes">Notes</label>
          <textarea id="f-notes" placeholder="Optional notes or context…"></textarea>
        </div>
        <div style="display:flex; flex-direction:column; justify-content:flex-end; gap:8px;">
          <button class="btn btn-primary" id="btn-add">Add Task</button>
          <button class="btn btn-ghost" id="btn-clear">Clear</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <span class="filter-label">Filter:</span>
    <button class="filter-btn active" data-filter="All">All</button>
    <button class="filter-btn" data-filter="Not Started">Not Started</button>
    <button class="filter-btn" data-filter="In Progress">In Progress</button>
    <button class="filter-btn" data-filter="Complete">Complete</button>
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Search tasks…" />
    </div>
  </div>

  <!-- Table -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">📋 Task List</span>
      <span id="row-count" style="font-size:0.78rem;color:var(--text-muted)">0 tasks</span>
    </div>
    <div class="table-wrap">
      <table id="task-table">
        <thead>
          <tr>
            <th data-col="name">Task Name <span class="sort-arrow">↕</span></th>
            <th data-col="department">Department <span class="sort-arrow">↕</span></th>
            <th data-col="priority">Priority <span class="sort-arrow">↕</span></th>
            <th data-col="status">Status <span class="sort-arrow">↕</span></th>
            <th data-col="deadline">Deadline <span class="sort-arrow">↕</span></th>
            <th data-col="notes">Notes</th>
            <th data-col="created">Added <span class="sort-arrow">↕</span></th>
            <th></th>
          </tr>
        </thead>
        <tbody id="task-tbody"></tbody>
      </table>
      <div id="empty-state" class="empty-state hidden">
        <div class="icon">📭</div>
        <p>No tasks found. Add one above!</p>
      </div>
    </div>
  </div>
</main>

<script>
  // ─── CONFIG ────────────────────────────────────────────────────────────────
  const FIREBASE_URL = 'https://stonewood-ops-default-rtdb.firebaseio.com/tasks.json';
  // ──────────────────────────────────────────────────────────────────────────

  let tasks = [];
  let filterStatus = 'All';
  let searchQuery  = '';
  let sortCol      = 'created';
  let sortDir      = 'desc';

  // ── Storage helpers ────────────────────────────────────────────────────────
  const LS_KEY = 'sw_ops_tasks';

  function saveLocal(t) {
    try { localStorage.setItem(LS_KEY, JSON.stringify(t)); } catch(_) {}
  }
  function loadLocal() {
    try { const s = localStorage.getItem(LS_KEY); return s ? JSON.parse(s) : null; } catch(_) { return null; }
  }

  async function loadTasks() {
    try {
      const r = await fetch(FIREBASE_URL);
      if (!r.ok) throw new Error(r.status);
      const data = await r.json();
      tasks = Array.isArray(data) ? data : [];
      saveLocal(tasks);
      setSyncStatus('synced');
    } catch(e) {
      const cached = loadLocal();
      if (cached) {
        tasks = cached;
        setSyncStatus('error');
        showToast('Loaded from local cache — cloud sync unavailable.', 'error');
      } else {
        setSyncStatus('error');
        tasks = [];
      }
    }
  }

  async function saveTasks() {
    saveLocal(tasks);
    setSyncStatus('loading');
    try {
      const r = await fetch(FIREBASE_URL, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(tasks)
      });
      if (!r.ok) throw new Error(r.status);
      setSyncStatus('synced');
    } catch(e) {
      setSyncStatus('error');
      showToast('Cloud save failed — data saved locally.', 'error');
    }
  }

  // ── Sync indicator ─────────────────────────────────────────────────────────
  function setSyncStatus(state) {
    const dot  = document.getElementById('sync-dot');
    const text = document.getElementById('sync-text');
    dot.className = 'dot';
    if (state === 'synced')  { dot.classList.add('');        text.textContent = 'Synced'; }
    if (state === 'loading') { dot.classList.add('loading'); text.textContent = 'Saving…'; }
    if (state === 'error')   { dot.classList.add('error');   text.textContent = 'Sync error'; }
  }

  // ── Toast ──────────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = ''; }, 3000);
  }

  // ── Stats ──────────────────────────────────────────────────────────────────
  function updateStats() {
    document.getElementById('stat-total').textContent     = tasks.length;
    document.getElementById('stat-inprogress').textContent = tasks.filter(t=>t.status==='In Progress').length;
    document.getElementById('stat-notstarted').textContent = tasks.filter(t=>t.status==='Not Started').length;
    document.getElementById('stat-complete').textContent   = tasks.filter(t=>t.status==='Complete').length;
  }

  // ── Deadline urgency ───────────────────────────────────────────────────────
  function deadlineClass(deadline) {
    if (!deadline) return 'deadline-none';
    const today = new Date(); today.setHours(0,0,0,0);
    const d = new Date(deadline + 'T00:00:00');
    const diff = Math.floor((d - today) / 86400000);
    if (diff < 0)  return 'deadline-over';
    if (diff <= 3) return 'deadline-warn';
    return 'deadline-ok';
  }
  function deadlineIcon(cls) {
    if (cls === 'deadline-over') return '⚠️';
    if (cls === 'deadline-warn') return '⏰';
    if (cls === 'deadline-ok')   return '✅';
    return '';
  }
  function formatDate(d) {
    if (!d) return '';
    const [y,m,day] = d.split('-');
    return `${m}/${day}/${y}`;
  }

  // ── Priority badge ─────────────────────────────────────────────────────────
  function priorityBadge(p) {
    const map = { 'High': 'priority-high', 'Medium': 'priority-medium', 'Low': 'priority-low' };
    const icon = { 'High': '▲', 'Medium': '●', 'Low': '▼' };
    const cls = map[p] || 'priority-medium';
    return `<span class="priority ${cls}">${icon[p]||'●'} ${p||'Medium'}</span>`;
  }

  // ── Badge ──────────────────────────────────────────────────────────────────
  function statusBadge(status) {
    const map = {
      'Not Started': 'badge-not-started',
      'In Progress':  'badge-in-progress',
      'Complete':     'badge-complete'
    };
    return `<span class="badge ${map[status]||'badge-not-started'}">${status}</span>`;
  }

  // ── Render ─────────────────────────────────────────────────────────────────
  function getFiltered() {
    let list = [...tasks];
    if (filterStatus !== 'All') list = list.filter(t => t.status === filterStatus);
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      list = list.filter(t =>
        t.name.toLowerCase().includes(q) ||
        (t.department||'').toLowerCase().includes(q) ||
        (t.notes||'').toLowerCase().includes(q)
      );
    }
    list.sort((a, b) => {
      let va = a[sortCol] || '', vb = b[sortCol] || '';
      if (typeof va === 'string') va = va.toLowerCase();
      if (typeof vb === 'string') vb = vb.toLowerCase();
      if (va < vb) return sortDir === 'asc' ? -1 : 1;
      if (va > vb) return sortDir === 'asc' ? 1 : -1;
      return 0;
    });
    return list;
  }

  function render() {
    updateStats();
    const list = getFiltered();
    const tbody = document.getElementById('task-tbody');
    const empty = document.getElementById('empty-state');
    document.getElementById('row-count').textContent = `${list.length} task${list.length!==1?'s':''}`;

    // sort arrows
    document.querySelectorAll('thead th[data-col]').forEach(th => {
      th.classList.toggle('sorted', th.dataset.col === sortCol);
      const arrow = th.querySelector('.sort-arrow');
      if (arrow) arrow.textContent = th.dataset.col === sortCol ? (sortDir==='asc'?'↑':'↓') : '↕';
    });

    if (!list.length) {
      tbody.innerHTML = '';
      empty.classList.remove('hidden');
      return;
    }
    empty.classList.add('hidden');

    tbody.innerHTML = list.map(t => {
      const dc = deadlineClass(t.deadline);
      const icon = deadlineIcon(dc);
      const deadlineHTML = t.deadline
        ? `<span class="deadline ${dc}">${icon} ${formatDate(t.deadline)}</span>`
        : `<span class="deadline deadline-none">—</span>`;
      return `
        <tr>
          <td style="font-weight:500">${escHtml(t.name)}</td>
          <td class="dept">${escHtml(t.department||'—')}</td>
          <td>${priorityBadge(t.priority||'Medium')}</td>
          <td>${statusBadge(t.status)}</td>
          <td>${deadlineHTML}</td>
          <td class="notes-cell" title="${escHtml(t.notes||'')}">${escHtml(t.notes||'—')}</td>
          <td style="font-size:0.78rem;color:var(--text-muted)">${t.created ? new Date(t.created).toLocaleDateString() : '—'}</td>
          <td style="white-space:nowrap">
            <button class="btn-edit" data-id="${t.id}" title="Edit task">✏️</button>
            <button class="btn-delete" data-id="${t.id}" title="Delete task">🗑</button>
          </td>
        </tr>`;
    }).join('');
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Edit Modal ──────────────────────────────────────────────────────────────────────────
  let editingId = null;

  function openModal(id) {
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    editingId = id;
    document.getElementById('e-name').value     = task.name;
    document.getElementById('e-dept').value     = task.department || '';
    document.getElementById('e-priority').value = task.priority || 'Medium';
    document.getElementById('e-status').value   = task.status;
    document.getElementById('e-deadline').value = task.deadline || '';
    document.getElementById('e-notes').value    = task.notes || '';
    document.getElementById('modal-backdrop').classList.add('open');
    document.getElementById('e-name').focus();
  }

  function closeModal() {
    document.getElementById('modal-backdrop').classList.remove('open');
    editingId = null;
  }

  document.getElementById('modal-close-btn').addEventListener('click', closeModal);
  document.getElementById('modal-cancel-btn').addEventListener('click', closeModal);
  document.getElementById('modal-backdrop').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-backdrop')) closeModal();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  document.getElementById('modal-save-btn').addEventListener('click', async () => {
    const name = document.getElementById('e-name').value.trim();
    if (!name) { document.getElementById('e-name').focus(); return; }
    const idx = tasks.findIndex(t => t.id === editingId);
    if (idx === -1) return;
    tasks[idx] = {
      ...tasks[idx],
      name,
      department: document.getElementById('e-dept').value.trim(),
      priority:   document.getElementById('e-priority').value,
      status:     document.getElementById('e-status').value,
      deadline:   document.getElementById('e-deadline').value,
      notes:      document.getElementById('e-notes').value.trim(),
    };
    closeModal();
    render();
    await saveTasks();
    showToast('Task updated ✓');
  });

  // ── Events ────────────────────────────────────────────────────────────────────────────
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filterStatus = btn.dataset.filter;
      render();
    });
  });

  document.getElementById('search-input').addEventListener('input', e => {
    searchQuery = e.target.value.trim();
    render();
  });

  document.querySelectorAll('thead th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      if (sortCol === th.dataset.col) {
        sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        sortCol = th.dataset.col;
        sortDir = 'asc';
      }
      render();
    });
  });

  const formBody   = document.getElementById('form-body');
  const formToggle = document.getElementById('form-toggle');
  formToggle.addEventListener('click', () => {
    const hidden = formBody.style.display === 'none';
    formBody.style.display = hidden ? '' : 'none';
    formToggle.textContent = hidden ? '▲' : '▼';
  });

  document.getElementById('btn-add').addEventListener('click', async () => {
    const name = document.getElementById('f-name').value.trim();
    if (!name) { document.getElementById('f-name').focus(); return; }
    const task = {
      id:         crypto.randomUUID(),
      name,
      department: document.getElementById('f-dept').value.trim(),
      status:     document.getElementById('f-status').value,
      priority:   document.getElementById('f-priority').value,
      deadline:   document.getElementById('f-deadline').value,
      notes:      document.getElementById('f-notes').value.trim(),
      created:    new Date().toISOString(),
    };
    tasks.unshift(task);
    render();
    await saveTasks();
    showToast('Task added ✓');
    document.getElementById('f-name').value     = '';
    document.getElementById('f-dept').value     = '';
    document.getElementById('f-notes').value    = '';
    document.getElementById('f-deadline').value = '';
    document.getElementById('f-status').value   = 'Not Started';
    document.getElementById('f-priority').value = 'Medium';
  });

  document.getElementById('btn-clear').addEventListener('click', () => {
    ['f-name','f-dept','f-notes','f-deadline'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-status').value   = 'Not Started';
    document.getElementById('f-priority').value = 'Medium';
  });

  document.getElementById('task-tbody').addEventListener('click', async e => {
    const del = e.target.closest('.btn-delete');
    const edt = e.target.closest('.btn-edit');
    if (del) {
      const id = del.dataset.id;
      tasks = tasks.filter(t => t.id !== id);
      render();
      await saveTasks();
      showToast('Task deleted');
    } else if (edt) {
      openModal(edt.dataset.id);
    }
  });

  // ── Init ────────────────────────────────────────────────────────────────────────────────
  async function init() {
    await loadTasks();
    render();
    document.getElementById('loading-overlay').classList.add('hidden');
  }

  init();
</script>
</body>
</html>
